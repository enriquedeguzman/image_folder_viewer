workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths: []
    scripts:
      - name: Flutter clean and upgrade packages
        script: |
          flutter clean
          rm -f pubspec.lock
          rm -f ios/Podfile.lock
          rm -rf ios/Pods
          flutter pub upgrade --major-versions
          flutter pub get

      - name: CocoaPods clean install
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build iOS without codesign
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths: []
    scripts:
      - name: Show versions
        script: |
          flutter --version
          ruby --version
          pod --version
          xcodebuild -version

      - name: Clean Flutter and iOS state
        script: |
          flutter clean
          flutter pub get

      - name: Install pods fresh
        script: |
          cd ios
          pod deintegrate || true
          pod cache clean --all || true
          rm -rf Pods Podfile.lock
          pod repo remove trunk || true
          pod setup
          pod install --repo-update
          cd ..

      - name: Build iOS no codesign
        script: |
          flutter build ios --release --no-codesign -v

    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log